<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Registro de cliente - Dog Grooming</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'surface-container': '#e6eeff',
            'surface-dim': '#ccdbf4',
            'on-secondary-fixed-variant': '#084b6f',
            'on-secondary-container': '#245c82',
            'surface': '#f8f9ff',
            'tertiary-container': '#727577',
            'error': '#ba1a1a',
            'on-primary-container': '#fdfcff',
            'secondary': '#2c6389',
            'tertiary-fixed': '#e0e3e5',
            'inverse-on-surface': '#ebf1ff',
            'primary-fixed-dim': '#a4c9ff',
            'inverse-surface': '#233144',
            'on-error-container': '#93000a',
            'on-primary': '#ffffff',
            'secondary-container': '#a2d4ff',
            'surface-container-low': '#eff4ff',
            'on-background': '#0d1c2f',
            'on-surface-variant': '#414751',
            'primary-container': '#2976c7',
            'on-primary-fixed': '#001c39',
            'on-tertiary': '#ffffff',
            'surface-bright': '#f8f9ff',
            'on-primary-fixed-variant': '#004883',
            'on-tertiary-fixed': '#191c1e',
            'surface-tint': '#0060ac',
            'surface-container-high': '#dde9ff',
            'surface-variant': '#d5e3fd',
            'outline': '#717783',
            'surface-container-lowest': '#ffffff',
            'on-error': '#ffffff',
            'surface-container-highest': '#d5e3fd',
            'error-container': '#ffdad6',
            'outline-variant': '#c1c7d3',
            'on-surface': '#0d1c2f',
            'on-secondary-fixed': '#001e30',
            'on-secondary': '#ffffff',
            'tertiary': '#595c5e',
            'secondary-fixed': '#cbe6ff',
            'on-tertiary-container': '#fbfdff',
            'primary-fixed': '#d4e3ff',
            'on-tertiary-fixed-variant': '#444749',
            'inverse-primary': '#a4c9ff',
            'primary': '#005da7',
            'secondary-fixed-dim': '#99ccf7',
            'tertiary-fixed-dim': '#c4c7c9',
            'background': '#f8f9ff'
          },
          borderRadius: {
            DEFAULT: '0.25rem',
            lg: '0.5rem',
            xl: '0.75rem',
            full: '9999px'
          },
          spacing: {
            'container-max': '1200px',
            gutter: '24px',
            lg: '40px',
            md: '24px',
            xl: '64px',
            sm: '12px',
            base: '8px',
            xs: '4px'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['Montserrat', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      background-color: #f8f9ff;
      -webkit-font-smoothing: antialiased;
      font-family: 'Inter', sans-serif;
    }
    .form-shadow {
      box-shadow: 0 15px 30px -5px rgba(51, 65, 85, 0.08);
    }
    .input-focus-ring:focus {
      outline: none;
      border-color: #005da7;
      box-shadow: 0 0 0 4px rgba(0, 93, 167, 0.1);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col text-on-surface">
  <header class="w-full px-gutter py-md max-w-container-max mx-auto flex items-center justify-center">
    <h1 class="font-heading text-2xl md:text-3xl font-semibold text-primary">Registro de cliente</h1>
  </header>

  <main class="flex-grow flex items-center justify-center p-md">
    <div class="bg-white w-full max-w-[500px] rounded-xl p-md md:p-xl form-shadow">
      <div class="text-center mb-xl">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-surface-container rounded-full mb-md">
          <span class="material-symbols-outlined text-primary text-[32px]">pets</span>
        </div>
        <h2 class="font-heading text-3xl md:text-4xl text-on-surface font-semibold">Registro de cliente</h2>
        <p class="text-on-surface-variant mt-xs">Registra un dueño y su mascota</p>
      </div>

      <form id="registroForm" class="space-y-md">
        <div class="space-y-xs">
          <label class="text-sm font-medium text-on-surface-variant block ml-xs">Nombre completo del dueño</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">person</span>
            <input name="nombre" class="w-full bg-[#F8FAFC] border border-[#E2E8F0] rounded-lg py-3 pl-12 pr-4 input-focus-ring transition-all placeholder:text-outline-variant" placeholder="Ej. Juan Pérez" required type="text">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
          <div class="space-y-xs">
            <label class="text-sm font-medium text-on-surface-variant block ml-xs">Teléfono</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">call</span>
              <input name="telefono" class="w-full bg-[#F8FAFC] border border-[#E2E8F0] rounded-lg py-3 pl-12 pr-4 input-focus-ring transition-all placeholder:text-outline-variant" placeholder="123 456 7890" required type="tel">
            </div>
          </div>

          <div class="space-y-xs">
            <label class="text-sm font-medium text-on-surface-variant block ml-xs">Correo electrónico</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
              <input name="email" class="w-full bg-[#F8FAFC] border border-[#E2E8F0] rounded-lg py-3 pl-12 pr-4 input-focus-ring transition-all placeholder:text-outline-variant" placeholder="email@ejemplo.com" required type="email">
            </div>
          </div>
        </div>

        <div class="relative py-xs">
          <div aria-hidden="true" class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-outline-variant opacity-30"></div>
          </div>
          <div class="relative flex justify-center text-xs uppercase">
            <span class="bg-white px-3 text-outline-variant tracking-widest font-semibold">Mascota</span>
          </div>
        </div>

        <div class="space-y-xs">
          <label class="text-sm font-medium text-on-surface-variant block ml-xs">Nombre de la mascota</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">pets</span>
            <input name="mascota" class="w-full bg-[#F8FAFC] border border-[#E2E8F0] rounded-lg py-3 pl-12 pr-4 input-focus-ring transition-all placeholder:text-outline-variant" placeholder="Ej. Toby" required type="text">
          </div>
        </div>

        <div class="space-y-xs pb-sm">
          <label class="text-sm font-medium text-on-surface-variant block ml-xs">Raza</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">pets</span>
            <input name="raza" class="w-full bg-[#F8FAFC] border border-[#E2E8F0] rounded-lg py-3 pl-12 pr-4 input-focus-ring transition-all placeholder:text-outline-variant" placeholder="Ej. Golden Retriever" required type="text">
          </div>
        </div>

        <button id="submitButton" class="w-full bg-primary hover:bg-primary-container text-on-primary font-medium py-4 rounded-xl shadow-lg shadow-primary/20 transform active:scale-[0.98] transition-all flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed" type="submit">
          <span class="material-symbols-outlined text-[20px]">how_to_reg</span>
          <span id="submitText">Registrar</span>
        </button>
      </form>

      <p id="mensajeEstado" class="mt-md text-center text-sm hidden"></p>

      <p class="mt-xl text-center text-xs text-outline-variant">
        Al registrar, confirmas que has leído nuestros <a class="text-primary hover:underline" href="#">términos de servicio</a>.
      </p>
    </div>
  </main>

  <div class="fixed top-0 right-0 -translate-y-1/4 translate-x-1/4 w-96 h-96 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="fixed bottom-0 left-0 translate-y-1/4 -translate-x-1/4 w-[500px] h-[500px] bg-secondary/5 rounded-full blur-[120px] pointer-events-none"></div>

  <script>
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('focus', () => {
        const icon = input.parentElement.querySelector('.material-symbols-outlined');
        if (icon) {
          icon.classList.remove('text-outline');
          icon.classList.add('text-primary');
        }
      });

      input.addEventListener('blur', () => {
        const icon = input.parentElement.querySelector('.material-symbols-outlined');
        if (icon) {
          icon.classList.remove('text-primary');
          icon.classList.add('text-outline');
        }
      });
    });

    const form = document.getElementById('registroForm');
    const submitButton = document.getElementById('submitButton');
    const submitText = document.getElementById('submitText');
    const mensajeEstado = document.getElementById('mensajeEstado');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      submitButton.disabled = true;
      submitText.textContent = 'Enviando...';
      mensajeEstado.classList.add('hidden');
      mensajeEstado.textContent = '';
      mensajeEstado.className = 'mt-md text-center text-sm hidden';

      const formData = new FormData(form);
      const payload = {
        nombre: formData.get('nombre'),
        telefono: formData.get('telefono'),
        email: formData.get('email'),
        mascota: formData.get('mascota'),
        raza: formData.get('raza')
      };

      try {
        const response = await fetch('https://n8n-n8n-test.hmrhwx.easypanel.host/webhook/registro-cliente', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error('Error al enviar el formulario');
        }

        form.reset();
        mensajeEstado.textContent = 'Registro enviado correctamente.';
        mensajeEstado.className = 'mt-md text-center text-sm text-green-700';
      } catch (error) {
        console.error(error);
        mensajeEstado.textContent = 'Hubo un problema al enviar el registro.';
        mensajeEstado.className = 'mt-md text-center text-sm text-red-700';
      } finally {
        submitButton.disabled = false;
        submitText.textContent = 'Registrar';
      }
    });
  </script>
</body>
</html>
